---
layout: default
---

<section id="intro">
  <div class="intro-text">
  </div>
</section>

<!--===== News (Blog Posts) =====-->
<section id="news" class="section-bg">
  <div class="container">
    <div class="row newsposts">
      {% for post in site.posts limit:5 %}
      <div class="col-lg-6">
        <div class="box wow fadeInLeft" onclick="location.href='{{ post.url }}';">
          {% if post.thumbnail %}
          <a class="thumbnail" href="{{ post.url }}"><div style="background-image:url({{ post.thumbnail }}), linear-gradient(rgba(54,59,64,0.9), rgba(54,98,115,0.9));"></div></a>
          {% endif %}
          <h4 class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></h4>
          <p class="post-excerpt">{{ post.excerpt }}</p>
          <p class="post-url"><a href="{{ post.url }}" class="read-more">weiterlesen</a></p>
        </div>
      </div>
      {% endfor %}
    </div>

    <div class="text-center">
      <a class="" href="/archive">alle Beiträge</a>
    </div>
    </div>
</section>

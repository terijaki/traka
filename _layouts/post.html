---
layout: default
---

<!--===== Post =====-->
<section id="post">
  <div id="blogpost" class="features-row section-bg">
    <div class="container">
      <article class="post">
        <h3 class="post-title">{{ page.title }}</h3>
        <span class="post-text">{{ page.date | date: "%d.%m.%Y" }}</span>
        <img class="post-thumbnail" src="{{ page.thumbnail }}" alt="">
        <div class="post-content">
          {{ content }}
        </div>
       </div>
      </article>
     </div>
    </div>
  </section>
<!--===== #post =====-->

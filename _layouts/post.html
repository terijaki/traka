---
layout: default
---

<!--===== Post =====-->
<section>
  <div id="blogpost">
    <div class="container">
      <article class="post">
        <h3 class="post-title">{{ page.title }}</h3>
        <span class="post-text">{{ page.date | date: "%d.%m.%Y" }}</span>
        <img class="post-thumbnail" src="{{ page.thumbnail }}" alt="">
        <div class="post-content">
          {{ content }}
        </div>
      </article>
     </div>
    </div>
  </section>
<!--===== #post =====-->
